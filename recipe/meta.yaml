{% set name = "perl-xml-xpath" %}
{% set version = "1.49" %}
{% set sha256 = "9c84a51be4cdb47bf88766ecab051fe092016472969e39f4acdba009885faabe" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://cpan.metacpan.org/authors/id/M/MA/MANWAR/XML-XPath-{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  noarch: generic
  number: 0
  script:
    - perl Makefile.PL INSTALLDIRS=vendor NO_PERLLOCAL=1 NO_PACKLIST=1
    - make
    - make test
    - make install VERBINST=1

requirements:
  build:
    - make
  host:
    - perl
    - perl-extutils-makemaker
    - perl-xml-parser
    - perl-path-tiny
  run:
    - perl
    - perl-xml-parser

test:
  imports:
    - XML::XPath
    - XML::XPath::Boolean
    - XML::XPath::Builder
    - XML::XPath::Expr
    - XML::XPath::Function
    - XML::XPath::Literal
    - XML::XPath::LocationPath
    - XML::XPath::Node
    - XML::XPath::Node::Attribute
    - XML::XPath::Node::Comment
    - XML::XPath::Node::Element
    - XML::XPath::Node::Namespace
    - XML::XPath::Node::PI
    - XML::XPath::Node::Text
    - XML::XPath::NodeSet
    - XML::XPath::Number
    - XML::XPath::Parser
    - XML::XPath::PerlSAX
    - XML::XPath::Root
    - XML::XPath::Step
    - XML::XPath::Variable
    - XML::XPath::XMLParser

about:
  home: https://metacpan.org/dist/XML-XPath
  license: Artistic-2.0
  summary: 'Parse and evaluate XPath statements.'
  license_file:
    - LICENSE

extra:
  recipe-maintainers:
    - cbrueffer
